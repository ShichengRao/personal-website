{{ define "head" }}
{{ $churchURL := .Site.Params.apps.churchURL | default "https://www.harvest-nyc.com/" }}
<meta http-equiv="refresh" content="0; url={{ $churchURL }}">
<script>window.location.replace("{{ $churchURL }}");</script>
{{ end }}

{{ define "main" }}
{{ $churchURL := .Site.Params.apps.churchURL | default "https://www.harvest-nyc.com/" }}
<main class="pa4">
  <p>Opening Harvest NYC...</p>
  <p><a href="{{ $churchURL }}">Continue to Harvest NYC</a></p>
</main>
{{ end }}
