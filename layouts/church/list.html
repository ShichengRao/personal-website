{{ define "head" }}
<style>
  .embed-page {
    min-height: calc(100vh - 6rem);
    background: #ffffff;
  }

  .embed-toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    padding: 0.85rem 1rem;
    border-bottom: 1px solid #e6e6e6;
    background: #ffffff;
  }

  .embed-toolbar h1 {
    margin: 0;
    font-size: 1rem;
    letter-spacing: 0;
  }

  .embed-toolbar a {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 38px;
    padding: 0.55rem 0.8rem;
    border: 1px solid #2d8659;
    border-radius: 8px;
    color: #2d8659;
    font-weight: 800;
    text-decoration: none;
    white-space: nowrap;
  }

  .embed-frame {
    display: block;
    width: 100%;
    height: calc(100vh - 10rem);
    min-height: 720px;
    border: 0;
    background: #ffffff;
  }

  @media (max-width: 700px) {
    .embed-toolbar {
      align-items: flex-start;
      flex-direction: column;
    }

    .embed-frame {
      height: calc(100vh - 12rem);
      min-height: 640px;
    }
  }
</style>
{{ end }}

{{ define "main" }}
{{ $churchURL := .Site.Params.apps.churchURL | default "https://www.harvest-nyc.com/" }}
<main class="embed-page">
  <div class="embed-toolbar">
    <h1>Harvest NYC</h1>
    <a href="{{ $churchURL }}" target="_blank" rel="noopener noreferrer">Open full site</a>
  </div>
  <iframe
    class="embed-frame"
    src="{{ $churchURL }}"
    title="Harvest NYC church website"
    loading="eager"
    referrerpolicy="strict-origin-when-cross-origin"
    allow="fullscreen; clipboard-write">
  </iframe>
</main>
{{ end }}
